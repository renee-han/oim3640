<!DOCTYPE html>
<html>
<head>
    <title>MBTA Stop Finder</title>
</head>
<body>
    <h1>Find the Nearest MBTA Stop</h1>
    {% if error %}
    <p style="color: red;">{{ error }}</p>
{% endif %}
    <form action="/nearest" method="POST">
        <input type="text" name="place" placeholder="Enter a place name...">
        <button type="submit">Search</button>
    </form>
</body>
</html>
