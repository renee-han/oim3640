<!DOCTYPE html>
<html>
<head>
    <title>MBTA Stop Finder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="mb-4">🚇 Find the Nearest MBTA Stop</h1>
        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form action="/nearest" method="POST" class="d-flex gap-2">
            <input type="text" name="place" placeholder="Enter a place name..." class="form-control">
            <button type="submit" class="btn btn-primary">Search</button>
        </form>
    </div>
</body>
</html>
