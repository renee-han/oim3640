<!DOCTYPE html>
<html>
<head>
    <title>MBTA Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="mb-4">🚇 Nearest MBTA Stop</h1>
        <div class="card p-4 mb-4">
            <p><strong>You searched for:</strong> {{ place }}</p>
            <p><strong>Nearest stop:</strong> {{ stop_name }}</p>
            <p><strong>Wheelchair accessible:</strong> {{ "Yes ♿" if wheelchair else "No" }}</p>
        </div>

        <div id="map" style="height: 400px; border-radius: 8px;"></div>

        <a href="/" class="btn btn-secondary mt-3">← Search Again</a>
    </div>

    <script>
        mapboxgl.accessToken = "{{ mapbox_token }}";

        const map = new mapboxgl.Map({
            container: "map",
            style: "mapbox://styles/mapbox/streets-v12",
            center: [{{ place_lng }}, {{ place_lat }}],
            zoom: 14
        });

        // Blue marker = your searched location
        new mapboxgl.Marker({ color: "blue" })
            .setLngLat([{{ place_lng }}, {{ place_lat }}])
            .setPopup(new mapboxgl.Popup().setHTML("<b>📍 {{ place }}</b>"))
            .addTo(map);

        // Red marker = nearest MBTA stop
        new mapboxgl.Marker({ color: "red" })
            .setLngLat([{{ stop_lng }}, {{ stop_lat }}])
            .setPopup(new mapboxgl.Popup().setHTML("<b>🚇 {{ stop_name }}</b>"))
            .addTo(map);
    </script>
</body>
</html>
